<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Path | Kosmos</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Kosmos</div>
    <nav class="nav-links" id="nav-auth"></nav>
  </header>

  <main class="page-shell">
    <section class="hero-card">
      <h1>Learning Path</h1>
      <p>Follow a structured lesson path that guides you step-by-step.</p>
    </section>

    <section class="tool-content">
      <div class="path-overview">
        <h2>Your Path</h2>
        <div class="lesson-grid" id="lesson-grid"></div>
      </div>

      <div class="lesson-detail" id="lesson-detail">
        <h2>Lesson Details</h2>
        <p>Select a lesson to begin practicing.</p>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
  <script>
    const lessons = [
      {
        title: 'Lesson 1: Greek Alphabet',
        description: 'Learn the letters and pronunciation of the Greek alphabet in both uppercase and lowercase form.',
        content: 'Use the dedicated alphabet lesson page to add each letter as a flashcard, then practice the sound and shape of every Greek symbol.',
        statusKey: 'lesson1Completed',
        page: '/lesson1-alphabet.html'
      },
      {
        title: 'Lesson 2: Diphthongs',
        description: 'Learn Greek diphthong with practice flashcards.',
        content: 'Explore vowel pairs like αι, οι, ει and special combinations like γγ, μπ, ντ. Practice these sounds with flashcards.',
        statusKey: 'lesson2Completed',
        page: '/lesson2-diphthongs.html'
      },
      {
        title: 'Lesson 3: Numbers & Colors',
        description: 'Build vocabulary for numbers and color words.',
        content: 'Learn Greek numbers from one to five and color words like red, blue, green, yellow, and white.',
        statusKey: 'lesson3Completed'
      },
      {
        title: 'Lesson 4: Food & Travel',
        description: 'Learn useful words for eating out and getting around.',
        content: 'Study words for water, bread, house, car, and simple travel phrases to help you explore Greece.',
        statusKey: 'lesson4Completed'
      },
      {
        title: 'Lesson 5: Review & Practice',
        description: 'Review what you have learned and reinforce it with practice.',
        content: 'Repeat flashcards, review lesson vocabulary, and practice simple Greek sentences to solidify your learning.',
        statusKey: 'lesson5Completed'
      }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      loadAuthNav();
      renderLessons();
    });

    function renderLessons() {
      const grid = document.getElementById('lesson-grid');
      grid.innerHTML = '';

      lessons.forEach((lesson, index) => {
        const completed = localStorage.getItem(lesson.statusKey) === 'true';
        const actionControl = lesson.page
          ? `<a class="button button-primary" href="${lesson.page}">Open Lesson</a>`
          : `<button class="button button-primary" onclick="selectLesson(${index})">Open Lesson</button>`;

        const lessonCard = document.createElement('article');
        lessonCard.className = 'lesson-card';
        lessonCard.innerHTML = `
          <h3>${lesson.title}</h3>
          <p>${lesson.description}</p>
          <div class="lesson-actions">
            ${actionControl}
            <span class="lesson-status">${completed ? 'Completed' : 'Not started'}</span>
          </div>
        `;
        grid.appendChild(lessonCard);
      });
    }

    function selectLesson(index) {
      const lesson = lessons[index];
      const detail = document.getElementById('lesson-detail');
      detail.innerHTML = `
        <h2>${lesson.title}</h2>
        <p>${lesson.description}</p>
        <p>${lesson.content}</p>
        <button class="button button-primary" id="complete-lesson-btn">Mark as Complete</button>
      `;

      document.getElementById('complete-lesson-btn').addEventListener('click', () => {
        localStorage.setItem(lesson.statusKey, 'true');
        renderLessons();
        detail.innerHTML = `
          <h2>${lesson.title}</h2>
          <p>${lesson.description}</p>
          <p>${lesson.content}</p>
          <p class="lesson-complete-message">Lesson complete! Choose the next lesson.</p>
        `;
      });
    }
  </script>
</body>
</html>
