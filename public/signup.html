<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Kosmos</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Kosmos</div>
    <nav class="nav-links" id="nav-auth"></nav>
  </header>

  <main class="form-shell">
    <div class="form-card">
      <h1>Create your account</h1>
      <p>Start learning Greek with Kosmos.</p>
      <form id="signup-form">
        <label>
          Name
          <input type="text" id="name" required />
        </label>
        <label>
          Email
          <input type="email" id="email" required />
        </label>
        <label>
          Password
          <input type="password" id="password" required minlength="6" />
        </label>
        <button class="button button-primary" type="submit">Sign up</button>
        <p class="small-note">Already have an account? <a href="/login.html">Sign in</a>.</p>
        <div class="error-message" id="form-error"></div>
      </form>
    </div>
  </main>

  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      redirectIfAuthenticated();
      loadAuthNav();

      const form = document.getElementById('signup-form');
      const errorBox = document.getElementById('form-error');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorBox.textContent = '';

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const result = await signupUser({ name, email, password });
        if (result.success) {
          window.location.href = '/';
        } else {
          errorBox.textContent = result.message || 'Signup failed. Please try again.';
        }
      });
    });
  </script>
</body>
</html>
