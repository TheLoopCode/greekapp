<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard Practice | Kosmos</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Kosmos</div>
    <nav class="nav-links" id="nav-auth"></nav>
  </header>

  <main class="page-shell">
    <section class="hero-card">
      <h1>Flashcard Practice</h1>
      <p>Practice your flashcards by flipping through them.</p>
    </section>

    <section class="tool-content">
      <div class="practice-session">
        <div id="flashcard-container" class="flashcard-practice">
          <div id="card-content">No flashcards available. Create some first!</div>
        </div>
        <div class="practice-controls">
          <button id="flip-btn" class="button button-primary">Flip Card</button>
          <button id="prev-btn" class="button button-secondary">Previous</button>
          <button id="next-btn" class="button button-secondary">Next</button>
        </div>
        <div id="progress">Card 0 of 0</div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      loadAuthNav();
      loadPracticeSession();
    });

    let flashcards = [];
    let currentIndex = 0;
    let isFlipped = false;

    function loadPracticeSession() {
      flashcards = JSON.parse(localStorage.getItem('kosmosFlashcards') || '[]');
      if (flashcards.length === 0) {
        document.getElementById('card-content').textContent = 'No flashcards available. Create some first!';
        document.getElementById('flip-btn').disabled = true;
        document.getElementById('prev-btn').disabled = true;
        document.getElementById('next-btn').disabled = true;
        return;
      }
      currentIndex = 0;
      isFlipped = false;
      showCard();
      updateProgress();
      document.getElementById('flip-btn').disabled = false;
      document.getElementById('prev-btn').disabled = currentIndex === 0;
      document.getElementById('next-btn').disabled = flashcards.length === 1;
    }

    function showCard() {
      const card = flashcards[currentIndex];
      const content = isFlipped ? card.greek : card.english;
      document.getElementById('card-content').textContent = content;
    }

    function updateProgress() {
      document.getElementById('progress').textContent = `Card ${currentIndex + 1} of ${flashcards.length}`;
    }

    document.getElementById('flip-btn').addEventListener('click', () => {
      isFlipped = !isFlipped;
      showCard();
    });

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        isFlipped = false;
        showCard();
        updateProgress();
        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').disabled = false;
      }
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (currentIndex < flashcards.length - 1) {
        currentIndex++;
        isFlipped = false;
        showCard();
        updateProgress();
        document.getElementById('next-btn').disabled = currentIndex === flashcards.length - 1;
        document.getElementById('prev-btn').disabled = false;
      }
    });
  </script>
</body>
</html>
